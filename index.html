<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safanh Alzaidi</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at top, #0f172a, #020617);
color:white;
}

.card{
text-align:center;
padding:40px;
background: rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter: blur(15px);
border-radius:20px;
width:90%;
max-width:420px;
animation: fadeIn 0.8s ease;
}

h1{
margin:0;
font-size:32px;
}

p{
color:#cbd5e1;
margin-top:8px;
font-size:14px;
}

.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:12px;
border-radius:12px;
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,0.2);
background: rgba(255,255,255,0.08);
transition:0.2s;
backdrop-filter: blur(10px);
}

.btn:hover{
transform: scale(1.05);
background: rgba(255,255,255,0.15);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<h1>safanh alzaidi</h1>
<p>Information Technology Graduate • Developer • Problem Solver</p>

<div class="buttons">

<a class="btn" href="cv.pdf" target="_blank">CV</a>

<a class="btn" href="https://github.com/" target="_blank">GitHub</a>

</div>

</div>

<script>
// تأثير بسيط احترافي
document.querySelectorAll(".btn").forEach(btn=>{
btn.addEventListener("mouseover", ()=>{
btn.style.boxShadow = "0 0 15px rgba(255,255,255,0.2)";
});
btn.addEventListener("mouseleave", ()=>{
btn.style.boxShadow = "none";
});
});
</script>

</body>
</html>
